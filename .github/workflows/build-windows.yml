name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build x86 executable
        shell: pwsh
        run: |
          ./native/build.ps1 -Arch x86

      - name: Package executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $rcText = Get-Content -LiteralPath 'native/src/XHLauncher.rc' -Raw
          if ($rcText -notmatch 'FILEVERSION\s+(\d+),(\d+),(\d+),(\d+)') {
            throw 'Could not read FILEVERSION from native/src/XHLauncher.rc'
          }

          $version = '{0}.{1}.{2}.{3}' -f $Matches[1], $Matches[2], $Matches[3], $Matches[4]
          $distRoot = Join-Path $PWD 'dist'
          $dist = Join-Path $distRoot "XHLauncher-$version-windows-x86"

          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          Copy-Item -LiteralPath 'native/publish/XHLauncher.exe' -Destination (Join-Path $dist 'XHLauncher.exe') -Force
          Copy-Item -LiteralPath 'DEFAULT_TEMPLATE.txt' -Destination (Join-Path $dist 'XHLauncher.ini') -Force
          Copy-Item -LiteralPath 'LICENSE' -Destination (Join-Path $dist 'LICENSE') -Force

          $zip = Join-Path $distRoot "XHLauncher-$version-windows-x86.zip"
          if (Test-Path -LiteralPath $zip) {
            Remove-Item -LiteralPath $zip -Force
          }

          Compress-Archive -Path (Join-Path $dist '*') -DestinationPath $zip -Force
          "PACKAGE_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XHLauncher-windows-x86
          path: ${{ env.PACKAGE_ZIP }}
